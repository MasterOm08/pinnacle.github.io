<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padhoplay</title>
  <meta name="description" content="Gamified learning platform for English, Math, and Science.">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app-container">
    <header class="main-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-book-open" style="color:var(--primary-red)"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        <h1 id="app-title">Padhoplay</h1>
      </div>
      <div class="header-actions">
        <button id="lang-toggle" class="btn btn-secondary" aria-label="Toggle Language" onclick="toggleLanguage()">
          <span id="current-lang">A/अ</span>
        </button>
      </div>
    </header>

    <main id="main-content">
      <!-- Dynamic Views (Landing, Teacher Dashboard, Student Map, Quiz UI) will be injected here -->
      <div id="loading-view" class="view active-view">
        <div class="loader"></div>
        <p data-i18n="loading">Loading...</p>
      </div>
    </main>

    <nav id="bottom-nav">
      <!-- Universal navigation buttons depending on the context -->
    </nav>
  </div>

  <script src="./db.js"></script>
  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker registration successful');
        }, err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
